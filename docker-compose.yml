version: "3.9"

services:
  mongodb:
    image: mongo:8
    container_name: cadence-mart-mongodb
    restart: unless-stopped

    ports:
      - "27017:27017"

    volumes:
      - mongodb-data:/data/db

    networks:
      - cadence-network

  backend:
    build:
      context: ./Backend

    container_name: cadence-mart-backend

    restart: unless-stopped

    ports:
      - "4000:4000"

    env_file:
      - ./Backend/.env

    environment:
      MONGODB_URL: mongodb://mongodb:27017/cadence-mart

    depends_on:
      - mongodb

    volumes:
      - ./Backend:/app
      - /app/node_modules

    networks:
      - cadence-network

  frontend:
    build:
      context: ./Frontend

    container_name: cadence-mart-frontend

    restart: unless-stopped

    ports:
      - "5173:5173"

    env_file:
      - ./Frontend/.env

    depends_on:
      - backend

    volumes:
      - ./Frontend:/app
      - /app/node_modules

    networks:
      - cadence-network

networks:
  cadence-network:

volumes:
  mongodb-data:
